<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard - Tuan Iky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0062ff; --bg: #f8fafc; --card: #ffffff; --dark: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: var(--dark); color: white; display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0; }
        .logo { padding: 0 25px 30px; font-family: 'Space Grotesk'; font-size: 24px; color: var(--p); border-bottom: 1px solid #1e293b; margin-bottom: 20px; }
        .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #94a3b8; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: white; background: rgba(255,255,255,0.05); border-left: 4px solid var(--p); }

        .workspace { flex: 1; display: flex; overflow: hidden; }
        .editor-area { flex: 1.2; padding: 40px; overflow-y: auto; }
        .preview-area { width: 450px; background: #cbd5e1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; border-left: 1px solid #ddd; }
        
        .glass-card { background: var(--card); border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 800; margin-bottom: 8px; color: #64748b; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 14px; background: #fcfcfc; }
        
        .btn { padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; width: 100%; transition: 0.3s; }
        .btn-p { background: var(--p); color: white; box-shadow: 0 4px 15px rgba(0,98,255,0.3); }

        #mobile-wrapper { width: 320px; height: 650px; background: #1e293b; border-radius: 45px; padding: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); position: relative; }
        #mobile-frame { width: 100%; height: 100%; background: white; border-radius: 35px; border: none; overflow: hidden; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="glass-card" style="width: 380px; text-align: center;">
            <div style="font-size: 40px; margin-bottom: 15px;">🧠</div>
            <h2 style="font-family: 'Space Grotesk';">Otak Digital Access</h2>
            <p style="color: #64748b; margin-bottom: 25px;">Verified for Tuan Iky</p>
            <input type="password" id="adm-pass" placeholder="System Password" style="text-align:center" onkeypress="if(event.key==='Enter')auth()">
            <button class="btn btn-p" onclick="auth()" style="margin-top: 15px;">UNLOCK SYSTEM</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar" style="display:none;">
        <div class="logo">IKY.PRO</div>
        <div class="nav-item active" onclick="tab(event, 'design')"><i class="fa fa-paint-brush"></i> Design Engine</div>
        <div class="nav-item" onclick="tab(event, 'content')"><i class="fa fa-plus-circle"></i> Add Project</div>
        <div class="nav-item" onclick="tab(event, 'database')"><i class="fa fa-database"></i> Library</div>
        <div class="nav-item" onclick="saveKey()" style="margin-top:auto;"><i class="fa fa-key"></i> System Token</div>
    </div>

    <div class="workspace" id="main" style="display:none;">
        <div class="editor-area">
            <div id="design" class="tab-pane active">
                <div class="glass-card">
                    <h3>Visual Identity</h3>
                    <div class="input-group">
                        <label>Display Name</label>
                        <input type="text" id="biz-name" oninput="sync()">
                    </div>
                    <div class="input-group">
                        <label>Bio / Slogan</label>
                        <textarea id="biz-bio" rows="2" oninput="sync()"></textarea>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="input-group">
                            <label>Accent Color</label>
                            <input type="color" id="biz-color" oninput="sync()">
                        </div>
                        <div class="input-group">
                            <label>Text Color</label>
                            <input type="color" id="biz-text" oninput="sync()">
                        </div>
                    </div>
                </div>
                <button class="btn btn-p" onclick="publish()"><i class="fa fa-cloud-upload"></i> DEPLOY PERUBAHAN</button>
            </div>

            <div id="content" class="tab-pane">
                <div class="glass-card">
                    <h3>New Content</h3>
                    <input type="text" id="post-title" placeholder="Project Name" style="margin-bottom:10px;">
                    <input type="text" id="post-wa" placeholder="WhatsApp Link (optional)" style="margin-bottom:10px;">
                    <div style="border: 2px dashed #ddd; padding: 20px; text-align: center; border-radius: 12px; cursor: pointer;" onclick="document.getElementById('file-in').click()">
                        <p id="file-status">Click to select image</p>
                        <input type="file" id="file-in" style="display:none;" onchange="handleFile()">
                    </div>
                    <button class="btn btn-p" onclick="addProject()" style="margin-top:20px;">ADD TO PREVIEW</button>
                </div>
            </div>

            <div id="database" class="tab-pane">
                <div class="glass-card">
                    <h3>Media Library</h3>
                    <div id="lib-list"></div>
                </div>
            </div>
        </div>

        <div class="preview-area">
            <div style="margin-bottom: 15px; font-weight: 800; font-size: 11px; letter-spacing: 2px;">LIVE SIMULATION</div>
            <div id="mobile-wrapper"><iframe id="mobile-frame"></iframe></div>
        </div>
    </div>

    <script>
        const REPO = "ikyshinicy/WEB-RIZKY-RERANZA";
        let db = { config: {}, projects: [] };
        let tempImg = "";

        function auth() {
            if(document.getElementById('adm-pass').value === 'eky598939') {
                sessionStorage.setItem('iky_auth', 'true');
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('sidebar').style.display = 'flex';
                document.getElementById('main').style.display = 'flex';
                init();
            }
        }

        async function init() {
            const token = localStorage.getItem('iky_gh_token');
            if(!token) return;
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const json = await res.json();
            db = JSON.parse(atob(json.content));
            db.sha = json.sha;
            
            document.getElementById('biz-name').value = db.name || "";
            document.getElementById('biz-bio').value = db.bio || "";
            document.getElementById('biz-color').value = (db.config && db.config.color) || "#0062ff";
            document.getElementById('biz-text').value = (db.config && db.config.text) || "#ffffff";
            
            sync(); render();
        }

        function sync() {
            const frame = document.getElementById('mobile-frame').contentDocument;
            const name = document.getElementById('biz-name').value;
            const bio = document.getElementById('biz-bio').value;
            const color = document.getElementById('biz-color').value;
            const text = document.getElementById('biz-text').value;

            let cards = db.projects.map(p => `
                <div style="background:white; border-radius:12px; overflow:hidden; margin-bottom:15px; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
                    <img src="${p.image}" style="width:100%; height:120px; object-fit:cover;">
                    <div style="padding:10px;"><b style="font-size:13px;">${p.title}</b></div>
                </div>
            `).join('');

            frame.open();
            frame.write(`
                <style>body{margin:0;font-family:sans-serif;background:#f1f5f9;} .h{background:${color};color:${text};padding:40px 20px;text-align:center;}</style>
                <div class="h"><h1>${name}</h1><p>${bio}</p></div>
                <div style="padding:15px;">${cards}</div>
            `);
            frame.close();
        }

        function handleFile() {
            const reader = new FileReader();
            reader.onload = (e) => { tempImg = e.target.result; document.getElementById('file-status').innerText = "Image Ready!"; };
            reader.readAsDataURL(document.getElementById('file-in').files[0]);
        }

        function addProject() {
            db.projects.unshift({ title: document.getElementById('post-title').value, image: tempImg || "https://via.placeholder.com/150", wa: document.getElementById('post-wa').value });
            sync(); render();
            alert("Project added to preview!");
        }

        async function publish() {
            const token = localStorage.getItem('iky_gh_token');
            db.name = document.getElementById('biz-name').value;
            db.bio = document.getElementById('biz-bio').value;
            db.config = { color: document.getElementById('biz-color').value, text: document.getElementById('biz-text').value };

            await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({ message: "Restore UI v7.2", content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))), sha: db.sha })
            });
            alert("Website Updated Successfully!");
        }

        function render() {
            document.getElementById('lib-list').innerHTML = db.projects.map((p, i) => `
                <div style="display:flex; align-items:center; gap:10px; padding:10px; border-bottom:1px solid #eee;">
                    <img src="${p.image}" width="40" height="40" style="object-fit:cover; border-radius:5px;">
                    <div style="flex:1; font-size:12px;"><b>${p.title}</b></div>
                    <button onclick="db.projects.splice(${i},1); sync(); render();" style="color:red; border:none; background:none; cursor:pointer;"><i class="fa fa-trash"></i></button>
                </div>
            `).join('');
        }

        function tab(e, id) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        function saveKey() {
            const key = prompt("Enter GitHub Token:");
            if(key) localStorage.setItem('iky_gh_token', key);
            location.reload();
        }
    </script>
</body>
</html>
