<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKY.PRO Master Admin v8</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0062ff; --bg: #f8fafc; --dark: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 240px; background: var(--dark); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo { padding: 30px 25px; font-family: 'Space Grotesk'; font-size: 22px; color: var(--p); border-bottom: 1px solid #1e293b; }
        .nav-item { padding: 15px 25px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .nav-item.active { background: rgba(255,255,255,0.05); color: white; border-left: 4px solid var(--p); }

        .workspace { flex: 1; display: flex; overflow: hidden; }
        .editor { flex: 1; padding: 40px; overflow-y: auto; }
        .preview { width: 420px; background: #cbd5e1; display: flex; align-items: center; justify-content: center; border-left: 1px solid #ddd; }

        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; }
        input, textarea { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; margin-top: 8px; box-sizing: border-box; font-family: inherit; }
        
        .btn { background: var(--p); color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 15px; }
        
        #phone { width: 310px; height: 630px; background: #0f172a; border-radius: 45px; padding: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.2); border: 4px solid #334155; }
        #phone iframe { width: 100%; height: 100%; background: white; border-radius: 35px; border: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">IKY.PRO v8</div>
        <div class="nav-item active"><i class="fa fa-layer-group"></i> Dashboard</div>
        <div class="nav-item" onclick="setToken()"><i class="fa fa-key"></i> Update Token</div>
    </div>

    <div class="workspace">
        <div class="editor">
            <div class="card">
                <h3>Branding Engine</h3>
                <label>Display Name</label>
                <input type="text" id="biz-name" oninput="sync()">
                <label style="margin-top:15px; display:block;">Bio / Slogan</label>
                <textarea id="biz-bio" rows="2" oninput="sync()"></textarea>
            </div>
            <button class="btn" onclick="publish()"><i class="fa fa-cloud-upload"></i> SAVE TO GITHUB</button>
        </div>

        <div class="preview">
            <div id="phone"><iframe id="live-view"></iframe></div>
        </div>
    </div>

    <script>
        const REPO = "ikyshinicy/WEB-RIZKY-RERANZA";
        let db = { projects: [] };

        async function init() {
            const token = localStorage.getItem('iky_gh_token');
            if(!token) return setToken();
            
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const json = await res.json();
                db = JSON.parse(atob(json.content));
                db.sha = json.sha;

                document.getElementById('biz-name').value = db.name || "";
                document.getElementById('biz-bio').value = db.bio || "";
                sync();
            } catch(e) { alert("GitHub Error. Periksa Token!"); }
        }

        function sync() {
            const frame = document.getElementById('live-view').contentDocument;
            const name = document.getElementById('biz-name').value;
            const bio = document.getElementById('biz-bio').value;

            frame.open();
            frame.write(`
                <style>body{margin:0; font-family:sans-serif; background:#f8fafc; text-align:center;} 
                .h{background:#0062ff; color:white; padding:40px 20px;} h1{margin:0; font-size:22px;} p{font-size:12px; opacity:0.8;}</style>
                <div class="h"><h1>${name}</h1><p>${bio}</p></div>
                <div style="padding:20px; font-size:11px; color:gray;">Preview Mode Active</div>
            `);
            frame.close();
        }

        async function publish() {
            const token = localStorage.getItem('iky_gh_token');
            db.name = document.getElementById('biz-name').value;
            db.bio = document.getElementById('biz-bio').value;

            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({
                    message: "Sync from V8 Dashboard",
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                    sha: db.sha
                })
            });
            if(res.ok) { alert("Data Tersimpan Aman di GitHub!"); location.reload(); }
        }

        function setToken() {
            const t = prompt("Masukkan GitHub Token:");
            if(t) { localStorage.setItem('iky_gh_token', t); init(); }
        }

        window.onload = init;
    </script>
</body>
</html>
