<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard - Tuan Iky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0062ff; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: #0f172a; color: white; display: flex; flex-direction: column; padding: 20px 0; }
        .logo { padding: 0 25px 30px; font-family: 'Space Grotesk'; font-size: 22px; color: var(--p); }
        .nav-item { padding: 12px 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #94a3b8; transition: 0.2s; }
        .nav-item.active { color: white; background: rgba(255,255,255,0.05); border-right: 4px solid var(--p); }

        .workspace { flex: 1; display: flex; overflow: hidden; }
        .editor-area { flex: 1.2; padding: 30px; overflow-y: auto; }
        .preview-area { flex: 0.8; background: #cbd5e1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .glass-card { background: var(--card); border-radius: 16px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: #64748b; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 14px; box-sizing: border-box; }
        
        .btn { padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.2s; }
        .btn-p { background: var(--p); color: white; }
        
        #mobile-frame { width: 360px; height: 640px; background: white; border-radius: 40px; border: 10px solid #1e293b; box-shadow: 0 25px 50px rgba(0,0,0,0.3); overflow: hidden; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="glass-card" style="width: 350px; text-align: center;">
            <h2 style="font-family: 'Space Grotesk';">Master Access</h2>
            <input type="password" id="adm-pass" placeholder="Password Sistem" onkeypress="if(event.key==='Enter')auth()">
            <button class="btn btn-p" onclick="auth()" style="margin-top: 15px;">LOGIN</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar" style="display:none;">
        <div class="logo">PRIVATE.PRO</div>
        <div class="nav-item active" onclick="tab(event, 'design')"><i class="fa fa-sliders"></i> Kontrol Visual</div>
        <div class="nav-item" onclick="tab(event, 'content')"><i class="fa fa-plus-circle"></i> Tambah Media</div>
        <div class="nav-item" onclick="tab(event, 'database')"><i class="fa fa-folder-open"></i> Database</div>
        <div class="nav-item" onclick="saveKey()" style="margin-top:auto;"><i class="fa fa-key"></i> Update Token</div>
    </div>

    <div class="workspace" id="main" style="display:none;">
        <div class="editor-area">
            <div id="design" class="tab-pane active">
                <div class="glass-card">
                    <h3>Konfigurasi Tampilan Real-Time</h3>
                    <div class="input-group">
                        <label>Nama Display</label>
                        <input type="text" id="biz-name" oninput="syncPreview()">
                    </div>
                    <div class="input-group">
                        <label>Bio/Slogan</label>
                        <textarea id="biz-bio" rows="2" oninput="syncPreview()"></textarea>
                    </div>
                    <div style="display: flex; gap: 15px;">
                        <div style="flex:1">
                            <label>Warna Tema</label>
                            <input type="color" id="biz-color" oninput="syncPreview()">
                        </div>
                        <div style="flex:1">
                            <label>Warna Teks</label>
                            <input type="color" id="biz-text" oninput="syncPreview()">
                        </div>
                    </div>
                </div>
                <button class="btn btn-p" onclick="deploy()">UPDATE WEBSITE SEKARANG</button>
            </div>

            <div id="content" class="tab-pane">
                <div class="glass-card">
                    <h3>Upload Konten Baru</h3>
                    <input type="text" id="post-title" placeholder="Judul Konten">
                    <select id="post-type" style="margin-top:10px;">
                        <option value="image">Gambar/Foto</option>
                        <option value="video">Link YouTube</option>
                    </select>
                    <input type="file" id="file-in" style="margin-top:10px;" onchange="handleFile()">
                    <button class="btn btn-p" onclick="addPost()" style="margin-top:20px;">SIMPAN KE DRAFT</button>
                </div>
            </div>

            <div id="database" class="tab-pane">
                <div class="glass-card">
                    <h3>Media Library</h3>
                    <div id="lib-list"></div>
                </div>
            </div>
        </div>

        <div class="preview-area">
            <div style="margin-bottom:10px; font-weight:800; font-size:12px;">LIVE MONITORING TAMPILAN WEB</div>
            <iframe id="mobile-frame"></iframe>
        </div>
    </div>

    <script>
        const REPO = "ikyshinicy/WEB-RIZKY-RERANZA";
        let db = { config: {}, projects: [] };
        let currentFile = "";

        function auth() {
            if(document.getElementById('adm-pass').value === 'eky598939') {
                sessionStorage.setItem('iky_auth', 'true');
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('sidebar').style.display = 'flex';
                document.getElementById('main').style.display = 'flex';
                loadCloudData();
            }
        }

        async function loadCloudData() {
            const token = localStorage.getItem('iky_token');
            if(!token) return;
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const json = await res.json();
            db = JSON.parse(atob(json.content));
            db.sha = json.sha;
            
            // Masukkan data dari cloud ke form secara otomatis
            document.getElementById('biz-name').value = db.name || "";
            document.getElementById('biz-bio').value = db.bio || "";
            document.getElementById('biz-color').value = (db.config && db.config.color) || "#0062ff";
            document.getElementById('biz-text').value = (db.config && db.config.text) || "#ffffff";
            
            syncPreview(); renderLib();
        }

        function syncPreview() {
            const frame = document.getElementById('mobile-frame').contentDocument;
            const name = document.getElementById('biz-name').value;
            const bio = document.getElementById('biz-bio').value;
            const color = document.getElementById('biz-color').value;
            const text = document.getElementById('biz-text').value;

            let cards = db.projects.map(p => `
                <div style="background:white; border-radius:12px; overflow:hidden; margin-bottom:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
                    <img src="${p.image}" style="width:100%; height:120px; object-fit:cover;">
                    <div style="padding:10px; font-weight:bold; font-size:13px;">${p.title}</div>
                </div>
            `).join('');

            frame.open();
            frame.write(`
                <style>body{margin:0; font-family:sans-serif; background:#f1f5f9;}</style>
                <div style="background:${color}; color:${text}; padding:40px 20px; text-align:center;">
                    <h1 style="margin:0;">${name}</h1><p>${bio}</p>
                </div>
                <div style="padding:15px;">${cards}</div>
            `);
            frame.close();
        }

        function handleFile() {
            const reader = new FileReader();
            reader.onload = (e) => currentFile = e.target.result;
            reader.readAsDataURL(document.getElementById('file-in').files[0]);
        }

        function addPost() {
            db.projects.unshift({
                title: document.getElementById('post-title').value,
                image: currentFile || "https://via.placeholder.com/150",
                type: document.getElementById('post-type').value
            });
            syncPreview();
            alert("Berhasil ditambah ke Preview! Klik 'UPDATE WEBSITE' untuk publikasi permanen.");
        }

        async function deploy() {
            const token = localStorage.getItem('iky_token');
            db.name = document.getElementById('biz-name').value;
            db.bio = document.getElementById('biz-bio').value;
            db.config = { color: document.getElementById('biz-color').value, text: document.getElementById('biz-text').value };

            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Sync Real-time Update",
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                    sha: db.sha
                })
            });
            if(res.ok) alert("Website Berhasil Diperbarui!");
        }

        function renderLib() {
            const list = document.getElementById('lib-list');
            list.innerHTML = db.projects.map((p, i) => `
                <div style="display:flex; align-items:center; gap:10px; padding:10px; border-bottom:1px solid #eee;">
                    <img src="${p.image}" width="40" height="40" style="object-fit:cover; border-radius:5px;">
                    <div style="flex:1; font-size:12px;"><b>${p.title}</b></div>
                    <button onclick="db.projects.splice(${i},1); syncPreview(); renderLib();" style="color:red; border:none; background:none; cursor:pointer;"><i class="fa fa-trash"></i></button>
                </div>
            `).join('');
        }

        function tab(e, id) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        function saveKey() {
            const key = prompt("Masukkan GitHub Token:");
            if(key) localStorage.setItem('iky_token', key);
            location.reload();
        }
    </script>
</body>
</html>
