<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard - Tuan Iky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0062ff; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --dark: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        .sidebar { width: 260px; background: var(--dark); color: white; display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0; }
        .logo { padding: 0 25px 30px; font-family: 'Space Grotesk'; font-size: 24px; color: var(--p); border-bottom: 1px solid #1e293b; margin-bottom: 20px; }
        .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #94a3b8; transition: 0.3s; font-weight: 500; }
        .nav-item:hover, .nav-item.active { color: white; background: rgba(255,255,255,0.05); border-left: 4px solid var(--p); }

        /* Workspace Layout */
        .workspace { flex: 1; display: flex; overflow: hidden; }
        .editor-area { flex: 1; padding: 40px; overflow-y: auto; background: var(--bg); }
        .preview-area { width: 450px; background: #e2e8f0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; border-left: 1px solid #ddd; }
        
        /* Premium Card UI */
        .glass-card { background: var(--card); border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); margin-bottom: 30px; }
        h3 { margin-top: 0; font-family: 'Space Grotesk'; font-size: 18px; margin-bottom: 20px; color: var(--dark); }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 800; margin-bottom: 8px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 14px; background: #fcfcfc; transition: 0.3s; }
        input:focus { border-color: var(--p); outline: none; background: #fff; }
        
        .btn { padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; width: 100%; transition: 0.3s; font-size: 14px; }
        .btn-p { background: var(--p); color: white; box-shadow: 0 4px 15px rgba(0,98,255,0.3); }
        .btn-p:hover { transform: translateY(-2px); opacity: 0.9; }

        /* iPhone Frame */
        #mobile-frame { width: 340px; height: 680px; background: white; border-radius: 45px; border: 12px solid #1e293b; box-shadow: 0 30px 60px rgba(0,0,0,0.2); overflow: hidden; position: relative; }
        
        #login-screen { position: fixed; inset: 0; background: #f1f5f9; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .tab-pane { display: none; animation: fadeIn 0.3s; }
        .tab-pane.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="glass-card" style="width: 380px; text-align: center;">
            <div style="font-size: 50px; margin-bottom: 20px;">🛡️</div>
            <h2 style="font-family: 'Space Grotesk'; font-size: 24px;">Master Access</h2>
            <p style="color: #64748b; font-size: 14px; margin-bottom: 30px;">Tuan Iky Identity Management</p>
            <input type="password" id="adm-pass" placeholder="System Password" style="text-align: center;" onkeypress="if(event.key==='Enter')auth()">
            <button class="btn btn-p" onclick="auth()" style="margin-top: 20px;">UNLOCK DASHBOARD</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar" style="display:none;">
        <div class="logo">PRIVATE.PRO</div>
        <div class="nav-item active" onclick="tab(event, 'design')"><i class="fa fa-paint-brush"></i> Visual Control</div>
        <div class="nav-item" onclick="tab(event, 'content')"><i class="fa fa-cloud-upload"></i> Quick Upload</div>
        <div class="nav-item" onclick="tab(event, 'database')"><i class="fa fa-layer-group"></i> Library</div>
        <div class="nav-item" onclick="saveKey()" style="margin-top:auto;"><i class="fa fa-key"></i> System Token</div>
    </div>

    <div class="workspace" id="main" style="display:none;">
        <div class="editor-area">
            <div id="design" class="tab-pane active">
                <div class="glass-card">
                    <h3>Identitas Digital</h3>
                    <div class="input-group">
                        <label>Display Name</label>
                        <input type="text" id="biz-name" oninput="sync()">
                    </div>
                    <div class="input-group">
                        <label>Professional Bio</label>
                        <textarea id="biz-bio" rows="3" oninput="sync()"></textarea>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="input-group">
                            <label>Accent Color</label>
                            <input type="color" id="biz-color" oninput="sync()" style="height: 50px; padding: 5px;">
                        </div>
                        <div class="input-group">
                            <label>Text Color</label>
                            <input type="color" id="biz-text" oninput="sync()" style="height: 50px; padding: 5px;">
                        </div>
                    </div>
                </div>
                <button class="btn btn-p" onclick="deploy()"><i class="fa fa-rocket"></i> PUBLISH PERUBAHAN</button>
            </div>

            <div id="content" class="tab-pane">
                <div class="glass-card">
                    <h3>Tambah Media Baru</h3>
                    <div class="input-group">
                        <label>Judul Project</label>
                        <input type="text" id="post-title" placeholder="Nama Konten">
                    </div>
                    <div class="input-group">
                        <label>Tipe Media</label>
                        <select id="post-type">
                            <option value="image">Foto / Portfolio</option>
                            <option value="video">YouTube Video</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Pilih File</label>
                        <input type="file" id="file-in" onchange="handleFile()">
                    </div>
                    <button class="btn btn-p" onclick="addPost()">SIMPAN KE DRAFT</button>
                </div>
            </div>

            <div id="database" class="tab-pane">
                <div class="glass-card">
                    <h3>Media Library</h3>
                    <div id="lib-list"></div>
                </div>
            </div>
        </div>

        <div class="preview-area">
            <div style="margin-bottom: 20px; font-weight: 800; font-size: 12px; color: #475569; letter-spacing: 2px;">
                <i class="fa fa-circle" style="color: #22c55e; font-size: 8px;"></i> LIVE PREVIEW TAMPILAN WEB
            </div>
            <div id="mobile-frame">
                <iframe id="frame-content" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>

    <script>
        const REPO = "ikyshinicy/WEB-RIZKY-RERANZA";
        let db = { config: {}, projects: [] };
        let tempImg = "";

        function auth() {
            if(document.getElementById('adm-pass').value === 'eky598939') {
                sessionStorage.setItem('iky_auth', 'true');
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('sidebar').style.display = 'flex';
                document.getElementById('main').style.display = 'flex';
                init();
            }
        }

        window.onload = () => { if(sessionStorage.getItem('iky_auth')) auth(); }

        async function init() {
            const token = localStorage.getItem('iky_token');
            if(!token) return;
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const json = await res.json();
            db = JSON.parse(atob(json.content));
            db.sha = json.sha;
            
            document.getElementById('biz-name').value = db.name || "";
            document.getElementById('biz-bio').value = db.bio || "";
            document.getElementById('biz-color').value = (db.config && db.config.color) || "#0062ff";
            document.getElementById('biz-text').value = (db.config && db.config.text) || "#ffffff";
            
            sync(); render();
        }

        function sync() {
            const frame = document.getElementById('frame-content').contentDocument;
            const name = document.getElementById('biz-name').value;
            const bio = document.getElementById('biz-bio').value;
            const color = document.getElementById('biz-color').value;
            const text = document.getElementById('biz-text').value;

            let cards = db.projects.map(p => `
                <div style="background:white; border-radius:15px; overflow:hidden; margin-bottom:20px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1);">
                    <img src="${p.image}" style="width:100%; height:140px; object-fit:cover;">
                    <div style="padding:15px; font-weight:800; font-size:14px; color:#1e293b;">${p.title}</div>
                </div>
            `).join('');

            frame.open();
            frame.write(`
                <style>
                    body { margin:0; font-family:'Inter', sans-serif; background:#f8fafc; }
                    .header { background:${color}; color:${text}; padding:50px 20px; text-align:center; transition:0.3s; }
                    .content { padding:20px; }
                </style>
                <div class="header">
                    <h1 style="margin:0; font-size:28px;">${name}</h1>
                    <p style="margin-top:10px; opacity:0.8; font-size:14px;">${bio}</p>
                </div>
                <div class="content">${cards}</div>
            `);
            frame.close();
        }

        function handleFile() {
            const reader = new FileReader();
            reader.onload = (e) => tempImg = e.target.result;
            reader.readAsDataURL(document.getElementById('file-in').files[0]);
        }

        function addPost() {
            db.projects.unshift({
                title: document.getElementById('post-title').value,
                image: tempImg || "https://via.placeholder.com/150",
                type: document.getElementById('post-type').value
            });
            sync(); render();
            alert("Berhasil masuk ke Preview!");
        }

        async function deploy() {
            const token = localStorage.getItem('iky_token');
            db.name = document.getElementById('biz-name').value;
            db.bio = document.getElementById('biz-bio').value;
            db.config = { color: document.getElementById('biz-color').value, text: document.getElementById('biz-text').value };

            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Deploy Master UI v7.2",
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                    sha: db.sha
                })
            });
            if(res.ok) alert("Berhasil dipublish ke domain Tuan!");
        }

        function render() {
            const list = document.getElementById('lib-list');
            list.innerHTML = db.projects.map((p, i) => `
                <div style="display:flex; align-items:center; gap:15px; padding:15px; border-bottom:1px solid #f1f5f9;">
                    <img src="${p.image}" width="50" height="50" style="object-fit:cover; border-radius:10px;">
                    <div style="flex:1;"><b>${p.title}</b></div>
                    <button onclick="db.projects.splice(${i},1); sync(); render();" style="color:#ef4444; border:none; background:none; cursor:pointer;"><i class="fa fa-trash"></i></button>
                </div>
            `).join('');
        }

        function tab(e, id) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        function saveKey() {
            const key = prompt("Update Cloud Token:");
            if(key) localStorage.setItem('iky_token', key);
            location.reload();
        }
    </script>
</body>
</html>
