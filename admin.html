<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard - Tuan Iky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0062ff; --p-soft: #e0ebff; --dark: #0f172a; --bg: #f8fafc; --card: #ffffff; }
        [data-theme="dark"] { --bg: #020617; --card: #1e293b; --dark: #f8fafc; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); margin: 0; display: flex; height: 100vh; transition: 0.3s; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--dark); color: white; display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0; }
        .logo { padding: 0 25px 30px; font-family: 'Space Grotesk'; font-size: 22px; color: var(--p); letter-spacing: -1px; }
        .nav-item { padding: 12px 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #94a3b8; transition: 0.2s; font-weight: 500; }
        .nav-item:hover, .nav-item.active { color: white; background: rgba(255,255,255,0.05); border-right: 4px solid var(--p); }

        /* Main Workspace */
        .workspace { flex: 1; display: flex; overflow: hidden; }
        .editor-area { flex: 1.2; padding: 30px; overflow-y: auto; background: var(--bg); }
        .preview-area { flex: 0.8; background: #e2e8f0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; border-left: 1px solid #ddd; }
        
        /* Components */
        .glass-card { background: var(--card); border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; background: var(--bg); color: var(--dark); font-size: 14px; box-sizing: border-box; }
        
        .btn { padding: 14px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; width: 100%; }
        .btn-p { background: var(--p); color: white; box-shadow: 0 4px 12px rgba(0,98,255,0.2); }
        .btn-p:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Premium iPhone Preview Frame */
        #mobile-wrapper { width: 320px; height: 650px; background: #1e293b; border-radius: 45px; padding: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4); border: 4px solid #334155; position: relative; }
        #mobile-wrapper::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 25px; background: #1e293b; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; z-index: 10; }
        #mobile-frame { width: 100%; height: 100%; background: white; border-radius: 35px; border: none; overflow: hidden; }

        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .tab-pane { display: none; animation: fadeIn 0.4s; }
        .tab-pane.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body data-theme="light">

    <div id="login-screen">
        <div class="glass-card" style="width: 380px; text-align: center;">
            <div style="font-size: 40px; margin-bottom: 15px;">🛡️</div>
            <h2 style="font-family: 'Space Grotesk'; margin: 0 0 10px;">Master Dashboard</h2>
            <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">Verified Access for Tuan Iky</p>
            <input type="password" id="adm-pass" placeholder="Enter Master Password" style="text-align:center" onkeypress="if(event.key==='Enter')auth()">
            <button class="btn btn-p" onclick="auth()" style="margin-top: 15px;">UNLOCK SYSTEM</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar" style="display:none;">
        <div class="logo">PRIVATE.PRO <span style="font-size: 10px; vertical-align: top; color: gray;">v7.2</span></div>
        <div class="nav-item active" onclick="tab(event, 'design')"><i class="fa fa-wand-magic-sparkles"></i> Design Engine</div>
        <div class="nav-item" onclick="tab(event, 'content')"><i class="fa fa-folder-plus"></i> Content Manager</div>
        <div class="nav-item" onclick="tab(event, 'database')"><i class="fa fa-database"></i> Media Library</div>
        <div class="nav-item" onclick="tab(event, 'settings')"><i class="fa fa-gears"></i> Core Settings</div>
        
        <div style="margin-top: auto; padding: 20px;">
            <button onclick="toggleTheme()" style="background:none; border:1px solid #334155; color:#94a3b8; padding:8px; border-radius:8px; width:100%; cursor:pointer;">
                <i class="fa fa-moon"></i> Dark Mode
            </button>
        </div>
    </div>

    <div class="workspace" id="main" style="display:none;">
        <div class="editor-area">
            <div id="design" class="tab-pane active">
                <div class="glass-card">
                    <h3>Visual Branding</h3>
                    <div class="input-group">
                        <label>Display Identity Name</label>
                        <input type="text" id="biz-name" oninput="sync()">
                    </div>
                    <div class="input-group">
                        <label>Professional Bio / Slogan</label>
                        <textarea id="biz-bio" rows="2" oninput="sync()"></textarea>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="input-group">
                            <label>Accent Color</label>
                            <input type="color" id="biz-color" oninput="sync()">
                        </div>
                        <div class="input-group">
                            <label>Text Color</label>
                            <input type="color" id="biz-text" oninput="sync()">
                        </div>
                    </div>
                </div>
                <button class="btn btn-p" onclick="publish()"><i class="fa fa-rocket"></i> PUBLISH PERUBAHAN</button>
            </div>

            <div id="content" class="tab-pane">
                <div class="glass-card">
                    <h3>Smart Uploader</h3>
                    <div class="input-group">
                        <label>Project Title</label>
                        <input type="text" id="post-title" placeholder="Nama project...">
                    </div>
                    <div class="input-group">
                        <label>Category</label>
                        <select id="post-cat">
                            <option value="Professional">Professional Work</option>
                            <option value="Digital">Digital Branding</option>
                            <option value="Creative">Creative Assets</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Media Source</label>
                        <select id="post-type" onchange="toggleSrc()">
                            <option value="img">Upload Local File</option>
                            <option value="yt">YouTube Link</option>
                        </select>
                    </div>
                    
                    <div id="src-file">
                        <div style="border: 2px dashed #e2e8f0; padding: 30px; text-align: center; border-radius: 12px; cursor: pointer;" onclick="document.getElementById('file-in').click()">
                            <i class="fa fa-cloud-arrow-up" style="font-size: 30px; color: var(--p);"></i>
                            <p style="font-size: 13px; color: #64748b;">Click to select media from gallery</p>
                            <input type="file" id="file-in" style="display:none;" onchange="processFile()">
                        </div>
                        <img id="up-preview" style="width:100%; height:120px; object-fit:cover; margin-top:15px; border-radius:8px; display:none;">
                    </div>

                    <div id="src-link" style="display:none;">
                        <input type="text" id="post-url" placeholder="Paste YouTube link here...">
                    </div>

                    <button class="btn btn-p" onclick="addPost()" style="margin-top:20px;"><i class="fa fa-plus"></i> ADD TO PREVIEW</button>
                </div>
            </div>

            <div id="database" class="tab-pane">
                <div class="glass-card">
                    <h3>Media Library</h3>
                    <div id="lib-list"></div>
                </div>
            </div>

            <div id="settings" class="tab-pane">
                <div class="glass-card">
                    <h3>System Config</h3>
                    <div class="input-group">
                        <label>GitHub Access Key</label>
                        <input type="password" id="gh-key" placeholder="ghp_xxxxxxxx">
                    </div>
                    <button class="btn btn-p" onclick="saveKey()">SAVE CONFIGURATION</button>
                </div>
            </div>
        </div>

        <div class="preview-area">
            <div style="margin-bottom: 15px; font-weight: 800; font-size: 12px; color: #64748b; letter-spacing: 2px;">
                <i class="fa fa-circle" style="color: #22c55e; font-size: 8px;"></i> LIVE SIMULATION
            </div>
            <div id="mobile-wrapper">
                <iframe id="mobile-frame"></iframe>
            </div>
        </div>
    </div>

    <script>
        const REPO = "ikyshinicy/WEB-RIZKY-RERANZA";
        let data = { config: {}, projects: [] };
        let tempImg = "";

        function auth() {
            if(document.getElementById('adm-pass').value === 'eky598939') {
                sessionStorage.setItem('iky_auth', 'true');
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('sidebar').style.display = 'flex';
                document.getElementById('main').style.display = 'flex';
                init();
            }
        }

        window.onload = () => { if(sessionStorage.getItem('iky_auth')) auth(); }

        function tab(e, id) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        function toggleTheme() {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        }

        function toggleSrc() {
            const t = document.getElementById('post-type').value;
            document.getElementById('src-file').style.display = t === 'img' ? 'block' : 'none';
            document.getElementById('src-link').style.display = t !== 'img' ? 'block' : 'none';
        }

        function processFile() {
            const reader = new FileReader();
            reader.onload = (e) => {
                tempImg = e.target.result;
                const p = document.getElementById('up-preview');
                p.src = tempImg; p.style.display = 'block';
            };
            reader.readAsDataURL(document.getElementById('file-in').files[0]);
        }

        async function init() {
            const token = localStorage.getItem('iky_gh_token');
            if(!token) return;
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const json = await res.json();
            data = JSON.parse(atob(json.content));
            data.sha = json.sha;
            
            document.getElementById('biz-name').value = data.name || "";
            document.getElementById('biz-bio').value = data.bio || "";
            document.getElementById('biz-color').value = (data.config && data.config.color) || "#0062ff";
            document.getElementById('biz-text').value = (data.config && data.config.text) || "#ffffff";
            
            sync(); render();
        }

        function sync() {
            const frame = document.getElementById('mobile-frame').contentDocument;
            const name = document.getElementById('biz-name').value;
            const bio = document.getElementById('biz-bio').value;
            const color = document.getElementById('biz-color').value;
            const text = document.getElementById('biz-text').value;

            let cards = data.projects.map(p => `
                <div style="background:white; border-radius:15px; overflow:hidden; margin-bottom:20px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1);">
                    <img src="${p.image}" style="width:100%; height:140px; object-fit:cover;">
                    <div style="padding:15px;"><b style="font-size:14px; display:block; margin-bottom:4px;">${p.title}</b><small style="color:gray;">${p.cat}</small></div>
                </div>
            `).join('');

            frame.open();
            frame.write(`
                <style>
                    body{margin:0;font-family:'Inter',sans-serif;background:#f8fafc;padding-bottom:50px;} 
                    .h{background:${color};color:${text};padding:50px 20px;text-align:center; transition:0.3s;}
                    h1{margin:0; font-size:24px;}
                    p{opacity:0.8; font-size:13px; margin-top:8px;}
                </style>
                <div class="h"><h1>${name}</h1><p>${bio}</p></div>
                <div style="padding:20px;">${cards}</div>
            `);
            frame.close();
        }

        function addPost() {
            const type = document.getElementById('post-type').value;
            let img = tempImg;
            if(type === 'yt') {
                const vidId = document.getElementById('post-url').value.split('v=')[1].split('&')[0];
                img = `https://img.youtube.com/vi/${vidId}/maxresdefault.jpg`;
            }
            data.projects.unshift({
                title: document.getElementById('post-title').value,
                cat: document.getElementById('post-cat').value,
                image: img || "https://via.placeholder.com/150"
            });
            sync(); render();
            alert("Added to Preview! Click 'Publish' to save to cloud.");
        }

        async function publish() {
            const token = localStorage.getItem('iky_gh_token');
            data.name = document.getElementById('biz-name').value;
            data.bio = document.getElementById('biz-bio').value;
            data.config = { color: document.getElementById('biz-color').value, text: document.getElementById('biz-text').value };

            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Deploy Master Sync",
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
                    sha: data.sha
                })
            });
            if(res.ok) alert("Website Berhasil Diperbarui!");
        }

        function render() {
            const list = document.getElementById('lib-list');
            list.innerHTML = data.projects.map((p, i) => `
                <div style="display:flex; align-items:center; gap:15px; padding:12px; border-bottom:1px solid #f1f5f9;">
                    <img src="${p.image}" width="40" height="40" style="object-fit:cover; border-radius:6px;">
                    <div style="flex:1;"><b style="font-size:13px;">${p.title}</b></div>
                    <button onclick="data.projects.splice(${i},1); sync(); render();" style="color:red; border:none; background:none; cursor:pointer;"><i class="fa fa-trash"></i></button>
                </div>
            `).join('');
        }

        function del(i) { if(confirm('Delete this asset?')) { data.projects.splice(i,1); publish(); } }
        function saveKey() { localStorage.setItem('iky_gh_token', document.getElementById('gh-key').value); location.reload(); }
    </script>
</body>
</html>
